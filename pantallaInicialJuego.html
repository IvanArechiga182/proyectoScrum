<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MethodsMatch</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="icon" href="imgs/logoAgile.ico" />
  </head>
  <body>
    <header>
      <h1 id="saludoInicial"></h1>
    </header>
    <main>
      <div class="topHeader">
        <h1 id="rondaHeader">a</h1>
        <h3 id="UIFeedback"></h3>
        <br />
        <button id="btnIniciarJuego" type="button" onclick="startGame()">
          comenzar a jugar
        </button>
      </div>
      <div class="puntajeUsuario" id="puntajeUsuario">
        <p id="puntajeAnterior"></p>
        <p id="rachaPreguntasCorrectas"></p>
        <p id="respuestasCorrectasIntroducidas"></p>
      </div>
      <div class="areaJuegoContainer" id="areaJuegoContainer">
        <section class="infoOportunidades" id="infoOportunidades">
          <p id="puntajeRonda"></p>
          <p id="puntajeGlobal"></p>
          <p>Oportunidades esta pregunta</p>
          <h4 id="opPregunta"></h4>
          <p>Oportunidades de ronda</p>
          <h4 id="opRonda"></h4>
        </section>

        <section class="seccionPreguntas" id="seccionPreguntas">
          <p id="pregunta"></p>
          <p id="temporizador"><span id="textoTemporizador"></span></p>
          <div class="areaRespuestas">
            <h2>RESPUESTAS</h2>
            <ol id="listaRespuestas">
              <li id="primerLugar">--------</li>
              <li id="segundoLugar">--------</li>
              <li id="tercerLugar">--------</li>
              <li id="cuartoLugar">--------</li>
            </ol>
          </div>
          <div class="areaJuego">
            <input
              type="text"
              id="respuestaUsuario"
              placeholder="Ingresa tu respuesta"
            />
            <button id="btnVerificarRespuesta">Responder</button>
          </div>
        </section>
      </div>
    </main>
  </body>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"
    integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.min.js"
    integrity="sha384-IDwe1+LCz02ROU9k972gdyvl+AESN10+x7tBKgc9I5HFtuNz0wWnPclzo6p9vxnk"
    crossorigin="anonymous"
  ></script>
  <script></script>
  <script src="js/pantallaInicialJuego.js" defer></script>
</html>
